name: Release Changelog

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  generate:
    name: Generate release notes
    if: startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check if last commit is a changelog update
        id: check
        run: |
          last_msg=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits \
            --jq '.[-1].commit.message')
          if [[ "$last_msg" == update\ changelog* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout PR branch
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract version from branch name
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          version="${{ github.head_ref }}"
          version="${version#release/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with Claude
        if: steps.check.outputs.skip == 'false'
        run: |
          npm install -g @anthropic-ai/claude-code

          claude --print --dangerously-skip-permissions "Update CHANGELOG.md for the upcoming release ${{ steps.version.outputs.version }}.

          Instructions:

          1. Find the last release tag:
             git describe --tags --abbrev=0

          2. Get merged PRs since that tag:
             gh pr list --base main --state merged --search \"merged:>=\$(git log <last_tag> -1 --format=%aI | cut -dT -f1)\" --json number,title,labels --limit 100
             (replace <last_tag> with the actual tag from step 1)

          3. Update CHANGELOG.md:
             - If CHANGELOG.md does not exist, create it.
             - Add a new entry at the TOP of the file, before any existing entries.
             - Follow this exact format (agent-friendly: anchored headings, consistent structure):

               <a id=\"${{ steps.version.outputs.version }}\"></a>
               ## [${{ steps.version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}) - $(date +%Y-%m-%d)

               ### Breaking Changes
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### New Features
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### Bug Fixes
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### Maintenance
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               **Full Changelog**: https://github.com/${{ github.repository }}/compare/<last_tag>...${{ steps.version.outputs.version }}

             - Categorize PRs by label: breaking → Breaking Changes, feature/enhancement → New Features, bug → Bug Fixes, rest → Maintenance.
             - Omit empty sections entirely.
             - Rewrite PR titles into clear user-facing sentences (imperative, lowercase first word).
             - Do not duplicate entries already present for ${{ steps.version.outputs.version }}.

          4. Only modify CHANGELOG.md, nothing else."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}

      - name: Commit changelog
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || {
            git commit -m "update changelog for ${{ steps.version.outputs.version }}"
            git push
          }

  check:
    name: Release notes present
    if: startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Extract version from branch name
        id: version
        run: |
          version="${{ github.head_ref }}"
          version="${version#release/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fail if release notes missing
        run: |
          version="${{ steps.version.outputs.version }}"
          if ! grep -q "id=\"$version\"" CHANGELOG.md 2>/dev/null && \
             ! grep -q "## \[$version\]" CHANGELOG.md 2>/dev/null; then
            echo "ERROR: No changelog entry found for $version in CHANGELOG.md"
            exit 1
          fi
          echo "Changelog entry for $version found."
