name: Release Changelog

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      head_ref:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  generate:
    name: Generate release notes
    if: startsWith(inputs.head_ref || github.head_ref, 'bump-version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Set refs
        id: refs
        run: |
          echo "head_ref=${{ inputs.head_ref || github.head_ref }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ inputs.pr_number || github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Check if last commit is a changelog update
        id: check
        run: |
          last_msg=$(gh api repos/${{ github.repository }}/pulls/${{ steps.refs.outputs.pr_number }}/commits \
            --jq '.[-1].commit.message')
          if [[ "$last_msg" == update\ changelog* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout PR branch
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.refs.outputs.head_ref }}
          fetch-depth: 0

      - name: Extract and validate version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          head_ref="${{ steps.refs.outputs.head_ref }}"
          version="${head_ref#bump-version-}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([._-][a-zA-Z0-9._-]+)?$ ]]; then
            echo "ERROR: Invalid version format: $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch release draft body
        if: steps.check.outputs.skip == 'false'
        id: draft
        run: |
          body=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft)] | first | .body // ""')
          # Pass via env file to avoid shell escaping issues
          {
            echo "body<<DRAFTEOF"
            echo "$body"
            echo "DRAFTEOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog with Claude
        if: steps.check.outputs.skip == 'false'
        run: |
          npm install -g @anthropic-ai/claude-code

          claude --print --dangerously-skip-permissions "Update CHANGELOG.md for the upcoming release.

          The version is in env var RELEASE_VERSION.
          The release-drafter output (raw PR list) is in env var DRAFT_BODY — use it as input.

          Instructions:

          1. Read DRAFT_BODY to understand what PRs are in this release.
             If DRAFT_BODY is empty, fall back to manual discovery:
             - Find last release tag: git describe --tags --abbrev=0
             - Get merged PRs since that tag:
               gh pr list --base main --state merged --search \"merged:>=\$(git log <last_tag> -1 --format=%aI | cut -dT -f1)\" --json number,title,labels --limit 100
               (replace <last_tag> with actual tag from above)

          2. Update CHANGELOG.md:
             - If CHANGELOG.md does not exist, create it with a top-level '# Changelog' heading.
             - Add a new entry at the TOP (after heading, before existing entries).
             - If the file contains a '<!-- towncrier release notes start -->' marker, insert BELOW it.
             - Use this exact format:

               <a id=\"VERSION\"></a>
               ## [VERSION](https://github.com/${{ github.repository }}/releases/tag/VERSION) - YYYY-MM-DD

               ### Breaking Changes
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### New Features
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### Bug Fixes
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               ### Maintenance
               - description [#number](https://github.com/${{ github.repository }}/pull/number)

               **Full Changelog**: https://github.com/${{ github.repository }}/compare/<last_tag>...VERSION

             - Replace VERSION with RELEASE_VERSION from env. Replace YYYY-MM-DD with today's date.
             - Categorize by label or PR title: breaking → Breaking Changes, feature/enhancement → New Features, bug/fix → Bug Fixes, rest → Maintenance.
             - Omit empty sections entirely.
             - Rewrite PR titles into clear, user-facing sentences (imperative, lowercase first word).
             - Do not duplicate entries already present for this version.

          3. Only modify CHANGELOG.md, nothing else."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          DRAFT_BODY: ${{ steps.draft.outputs.body }}

      - name: Commit changelog
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || {
            git commit -m "update changelog for ${{ steps.version.outputs.version }}"
            git push
          }

  check:
    name: Release notes present
    if: startsWith(inputs.head_ref || github.head_ref, 'bump-version')
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: read
    steps:
      - name: Set refs
        id: refs
        run: |
          echo "head_ref=${{ inputs.head_ref || github.head_ref }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.refs.outputs.head_ref }}

      - name: Extract version
        id: version
        run: |
          head_ref="${{ steps.refs.outputs.head_ref }}"
          version="${head_ref#bump-version-}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fail if release notes missing
        run: |
          version="${{ steps.version.outputs.version }}"
          if ! grep -q "id=\"$version\"" CHANGELOG.md 2>/dev/null && \
             ! grep -q "## \[$version\]" CHANGELOG.md 2>/dev/null; then
            echo "ERROR: No changelog entry found for $version in CHANGELOG.md"
            exit 1
          fi
          echo "Changelog entry for $version found."
