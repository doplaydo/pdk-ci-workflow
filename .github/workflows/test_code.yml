name: Test code

on:
  workflow_call:
    inputs:
      pdk_ci_ref:
        description: 'pdk-ci-workflow ref for canonical pre-commit config (default: main)'
        required: false
        default: 'main'
        type: string
    secrets:
      GFP_API_KEY:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GFP_API_KEY: ${{ secrets.GFP_API_KEY }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
    - name: Fetch canonical pre-commit config
      run: |
        curl -sf "https://raw.githubusercontent.com/doplaydo/pdk-ci-workflow/${{ inputs.pdk_ci_ref }}/templates/.pre-commit-config.yaml" \
          | sed 's/rev: main/rev: ${{ inputs.pdk_ci_ref }}/' \
          > .pre-commit-config.yaml
    - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
  test_code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install dependencies
        run: |
          make install
      - name: Test with pytest
        run: make test
  test_gfp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install dependencies
        run: |
          make install
      - name: Test with pytest
        run: uv run gfp test
        