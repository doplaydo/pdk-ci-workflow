name: build docs
on:
  workflow_call:
    inputs:
      retention-days:
        description: 'Number of days to retain the pages artifact'
        required: false
        type: number
        default: 1
    secrets:
      GFP_API_KEY:
        required: false
      SIMCLOUD_APIKEY:
        required: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-pages
  cancel-in-progress: false
jobs:
  build-docs:
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Sphinx docs to gh-pages
    env:
      GFP_API_KEY: ${{ secrets.GFP_API_KEY }}
      SIMCLOUD_APIKEY: ${{ secrets.SIMCLOUD_APIKEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: |
          make dev
      - name: Download sync_changelog script
        run: curl -fsSL https://raw.githubusercontent.com/doplaydo/pdk-ci-workflow/main/scripts/sync_changelog.py -o sync_changelog.py
      - name: make docs
        run: |
          make docs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: "./docs/_build/html/"
          retention-days: ${{ inputs.retention-days }}
